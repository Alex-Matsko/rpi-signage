name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install -r server/requirements.txt pytest httpx
      - name: Compile agent
        run: python -m py_compile agent/agent.py
      - name: Run agent tests
        run: pytest agent -q
      - name: Run server tests
        working-directory: server
        run: pytest tests -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t rpi-signage-server .
      - name: Smoke test container
        run: |
          docker run -d --name signage -p 8080:8000 \
            -e ADMIN_PASSWORD=ci-test-12345 rpi-signage-server
          for i in $(seq 1 20); do
            curl -fs http://localhost:8080/healthz && exit 0
            sleep 1
          done
          docker logs signage
          exit 1
