{% extends "base.html" %}
{% block title %}Плейлисты — RPi Signage{% endblock %}
{% block content %}
<h1>Плейлисты</h1>

<form method="post" action="/playlists/create" class="inline-form panel">
  <input type="text" name="name" placeholder="Название нового плейлиста" required class="grow">
  <button type="submit" class="btn primary">Создать</button>
</form>

<table class="table">
  <tr><th>Название</th><th>Афиш</th><th></th></tr>
  {% for pl in playlists %}
  <tr>
    <td><a href="/playlists/{{ pl.id }}">{{ pl.name }}</a></td>
    <td>{{ pl.items|length }}</td>
    <td>
      <form method="post" action="/playlists/{{ pl.id }}/delete"
            onsubmit="return confirm('Удалить плейлист «{{ pl.name }}»?')">
        <button type="submit" class="btn danger">Удалить</button>
      </form>
    </td>
  </tr>
  {% else %}
  <tr><td colspan="3" class="muted">Плейлистов пока нет.</td></tr>
  {% endfor %}
</table>
{% endblock %}
