{% extends "base.html" %}
{% block title %}Группы — RPi Signage{% endblock %}
{% block content %}
<h1>Группы экранов</h1>

<form method="post" action="/groups/create" class="inline-form panel">
  <input type="text" name="name" placeholder="Название новой группы" required class="grow">
  <button type="submit" class="btn primary">Создать</button>
</form>

<table class="table">
  <tr><th>Группа</th><th>Плейлист группы</th><th>Экранов</th><th></th></tr>
  {% for g in groups %}
  <tr>
    <td colspan="2">
      <form method="post" action="/groups/{{ g.id }}/update" class="inline-form">
        <input type="text" name="name" value="{{ g.name }}" required class="grow">
        <select name="playlist_id">
          <option value="0">— не назначен —</option>
          {% for pl in playlists %}
          <option value="{{ pl.id }}" {{ 'selected' if g.playlist_id == pl.id }}>{{ pl.name }}</option>
          {% endfor %}
        </select>
        <button type="submit" class="btn">Сохранить</button>
      </form>
    </td>
    <td>{{ g.devices|length }}</td>
    <td>
      <form method="post" action="/groups/{{ g.id }}/delete"
            onsubmit="return confirm('Удалить группу «{{ g.name }}»?')">
        <button type="submit" class="btn danger">Удалить</button>
      </form>
    </td>
  </tr>
  {% else %}
  <tr><td colspan="4" class="muted">Групп пока нет.</td></tr>
  {% endfor %}
</table>
{% endblock %}
