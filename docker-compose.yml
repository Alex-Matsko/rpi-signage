services:
  server:
    build: .
    container_name: rpi-signage-server
    ports:
      - "${SIGNAGE_PORT:-8080}:8000"
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Задайте ADMIN_PASSWORD (например, в файле .env)}
      TZ: ${TZ:-Europe/Moscow}
      SIGNAGE_MAX_UPLOAD_MB: ${SIGNAGE_MAX_UPLOAD_MB:-1024}
      SIGNAGE_POLL_INTERVAL: ${SIGNAGE_POLL_INTERVAL:-60}
      # Доверять заголовкам X-Forwarded-* от reverse-proxy (HAProxy/nginx),
      # чтобы ссылки строились как https://<домен>, а не внутренний адрес.
      # В проде можно сузить до IP прокси вместо "*".
      FORWARDED_ALLOW_IPS: ${SIGNAGE_FORWARDED_ALLOW_IPS:-*}
    volumes:
      # Данные (БД, медиа, скриншоты, ключ сессий) хранятся в папке на хосте.
      # Это переживает `docker compose down` и даже `down -v` — удалить данные
      # можно только вручную, удалив саму папку. Путь меняется в .env.
      - ${SIGNAGE_DATA_PATH:-./data}:/data
    restart: unless-stopped
